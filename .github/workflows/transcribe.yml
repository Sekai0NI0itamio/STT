name: STT Transcribe

on:
  workflow_dispatch:
    inputs:
      file_glob:
        description: Optional glob relative to the repo root, for example incoming/**/*.mp3
        required: false
        type: string
      max_parallel:
        description: Maximum number of files to process in parallel
        required: false
        default: unlimited
        type: choice
        options:
          - unlimited
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"
      chunk_workers:
        description: Maximum concurrent chunk workers inside each file job
        required: false
        default: unlimited
        type: choice
        options:
          - unlimited
          - "1"
          - "2"
          - "4"
          - "8"
          - "16"
      chunk_seconds:
        description: Maximum silence-aware chunk length in seconds
        required: false
        default: "60"
        type: string
      model:
        description: faster-whisper model size (small is the fastest practical CPU default)
        required: false
        default: small
        type: choice
        options:
          - tiny
          - base
          - small
          - medium
      emit_chunk_debug:
        description: Upload chunk-level transcript and debug files
        required: false
        default: false
        type: boolean
      fail_on_any_error:
        description: Mark the overall run as failed if any input fails
        required: false
        default: true
        type: boolean
      dependency_mode:
        description: Dependency install strategy for the cached virtualenv
        required: false
        default: repair-missing
        type: choice
        options:
          - repair-missing
          - cached
          - reinstall

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  discover:
    name: Discover inputs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
      max_parallel: ${{ steps.discover.outputs.max_parallel }}
      fail_on_any_error: ${{ steps.discover.outputs.fail_on_any_error }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore cached base virtualenv
        if: ${{ inputs.dependency_mode != 'reinstall' }}
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-base-${{ hashFiles('pyproject.toml') }}

      - name: Prepare Python environment
        run: bash .github/scripts/ensure_python_env.sh base "${{ inputs.dependency_mode }}"

      - name: Discover committed inputs
        id: discover
        run: |
          .venv/bin/python -m stt.cli discover \
            --config stt.toml \
            --file-glob "${{ inputs.file_glob }}" \
            --max-parallel "${{ inputs.max_parallel }}" \
            --chunk-seconds "${{ inputs.chunk_seconds }}" \
            --chunk-workers "${{ inputs.chunk_workers }}" \
            --model "${{ inputs.model }}" \
            --emit-chunk-debug "${{ inputs.emit_chunk_debug }}" \
            --fail-on-any-error "${{ inputs.fail_on_any_error }}" \
            --manifest-out outputs/discovery/manifest.json \
            --github-output-file "$GITHUB_OUTPUT"

      - name: Upload discovery manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stt-discovery
          path: outputs/discovery
          retention-days: 14

      - name: Fail early when nothing matched
        run: |
          if [ "${{ steps.discover.outputs.count }}" = "0" ]; then
            {
              echo "# STT Run Summary"
              echo
              echo "- Files discovered: 0"
              echo "- No eligible .mp3 files matched the current filter."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  process-file:
    name: Process ${{ matrix.relpath }}
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.discover.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore cached runtime virtualenv
        if: ${{ inputs.dependency_mode != 'reinstall' }}
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-runtime-${{ hashFiles('pyproject.toml') }}

      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/ctranslate2
          key: ${{ runner.os }}-faster-whisper-${{ inputs.model }}

      - name: Prepare runtime environment
        run: |
          set -euo pipefail
          ffmpeg_pid=""
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "Using preinstalled ffmpeg"
          else
            (
              sudo apt-get update
              sudo apt-get install -y ffmpeg
            ) &
            ffmpeg_pid=$!
          fi
          bash .github/scripts/ensure_python_env.sh runtime "${{ inputs.dependency_mode }}"
          if [ -n "${ffmpeg_pid:-}" ]; then
            wait "$ffmpeg_pid"
          fi
          ffmpeg -version | head -n 1

      - name: Process input file
        id: process
        run: |
          set +e
          .venv/bin/python -m stt.cli process-one \
            --config stt.toml \
            --input-relpath "${{ matrix.relpath }}" \
            --job-output-dir outputs/job \
            --chunk-seconds "${{ inputs.chunk_seconds }}" \
            --chunk-workers "${{ inputs.chunk_workers }}" \
            --model "${{ inputs.model }}" \
            --emit-chunk-debug "${{ inputs.emit_chunk_debug }}" \
            --fail-on-any-error "${{ inputs.fail_on_any_error }}"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload per-file result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: outputs/job/${{ matrix.slug }}
          if-no-files-found: error
          retention-days: 14

      - name: Replay file status
        if: always()
        run: exit ${{ steps.process.outputs.exit_code }}

  summarize:
    name: Summarize run
    needs:
      - discover
      - process-file
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore cached base virtualenv
        if: ${{ inputs.dependency_mode != 'reinstall' }}
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-base-${{ hashFiles('pyproject.toml') }}

      - name: Prepare Python environment
        run: bash .github/scripts/ensure_python_env.sh base "${{ inputs.dependency_mode }}"

      - name: Download per-file artifacts
        if: ${{ needs.discover.outputs.count != '0' }}
        uses: actions/download-artifact@v4
        with:
          pattern: stt-file-*
          path: outputs/downloaded/per-file
          merge-multiple: false

      - name: Build run summary
        id: summarize
        run: |
          set +e
          .venv/bin/python -m stt.cli summarize \
            --config stt.toml \
            --results-root outputs/downloaded/per-file \
            --output-dir outputs/final \
            --expected-count "${{ needs.discover.outputs.count }}" \
            --chunk-seconds "${{ inputs.chunk_seconds }}" \
            --chunk-workers "${{ inputs.chunk_workers }}" \
            --model "${{ inputs.model }}" \
            --fail-on-any-error "${{ inputs.fail_on_any_error }}"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assemble consolidated artifact
        if: always()
        run: |
          mkdir -p outputs/final/per-file
          if [ -d outputs/downloaded/per-file ]; then
            cp -R outputs/downloaded/per-file/. outputs/final/per-file/
          fi

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stt-run-results
          path: outputs/final
          retention-days: 14

      - name: Replay summary status
        if: always()
        run: exit ${{ steps.summarize.outputs.exit_code }}
