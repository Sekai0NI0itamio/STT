name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore cached dev virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-dev-${{ hashFiles('pyproject.toml') }}

      - name: Prepare validation environment
        run: bash .github/scripts/ensure_python_env.sh dev repair-missing

      - name: Lint
        run: .venv/bin/python -m ruff check .

      - name: Compile Python modules
        run: .venv/bin/python -m compileall stt tests

      - name: Run unit tests
        run: .venv/bin/python -m unittest discover -s tests -v
